<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-row">
        <div>
          <h1 class="header-title">FIFA WORLD CUP 2026</h1>
          <p class="header-sub">Scores updated <span id="live-time">--:--</span></p>
        </div>
        <button class="reset-btn" id="reset-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6"/><path d="M3.05 10.5a9 9 0 0 1 16.14-4.17L21.5 8M2.5 16l2.31 1.67A9 9 0 0 0 20.95 13.5"/></svg>
          Reset
        </button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="groups">Groups</button>
      <button class="tab" data-tab="knockouts">Knockouts</button>
    </div>

    <div id="groups-view" class="tab-content active">
      <div class="group-grid" id="group-grid"></div>
    </div>

    <div id="knockouts-view" class="tab-content">
      <div id="bracket"></div>
    </div>
  </div>

  <script>
    const liveTime = document.getElementById('live-time');
    function tickClock() {
      if (liveTime) {
        const now = new Date();
        liveTime.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }
    }
    tickClock();
    setInterval(tickClock, 1000);

    const completedGroups = new Set('abcdefghijkl'.split(''));

    const flags = {
      'Mexico':'mx','South Africa':'za','South Korea':'kr','Czechia':'cz',
      'Switzerland':'ch','Canada':'ca','Bosnia and Herzegovina':'ba','Qatar':'qa',
      'Brazil':'br','Morocco':'ma','Scotland':'gb-sct','Haiti':'ht',
      'United States':'us','Australia':'au','Paraguay':'py','Türkiye':'tr',
      'Germany':'de','Ivory Coast':'ci','Ecuador':'ec','Curaçao':'cw',
      'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
      'Egypt':'eg','Iran':'ir','Belgium':'be','New Zealand':'nz',
      'Spain':'es','Uruguay':'uy','Cape Verde':'cv','Saudi Arabia':'sa',
      'France':'fr','Norway':'no','Senegal':'sn','Iraq':'iq',
      'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
      'Colombia':'co','Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz',
      'England':'gb-eng','Ghana':'gh','Croatia':'hr','Panama':'pa',
    };

    function flagUrl(code) {
      if (code === 'gb-sct') return 'https://flagcdn.com/16x12/gb-sct.png';
      if (code === 'gb-eng') return 'https://flagcdn.com/16x12/gb-eng.png';
      return `https://flagcdn.com/16x12/${code}.png`;
    }

    const STORAGE_KEY = 'wc26_predictions';

    function loadPreds() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function savePreds(p) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
    }

    const groupMatches = {

        { mid: 'j-0', h: 'Argentina', a: 'Algeria', hs: 3, as: 0 },
        { mid: 'j-1', h: 'Austria', a: 'Jordan', hs: 3, as: 1 },

        { mid: 'j-3', h: 'Jordan', a: 'Algeria', hs: 1, as: 2 },

        { mid: 'k-0', h: 'Portugal', a: 'DR Congo', hs: 1, as: 1 },
        { mid: 'k-1', h: 'Uzbekistan', a: 'Colombia', hs: 1, as: 3 },
        { mid: 'k-2', h: 'Portugal', a: 'Uzbekistan', hs: 5, as: 0 },

        { mid: 'k-5', h: 'DR Congo', a: 'Uzbekistan', hs: 3, as: 1 },
      ],
      l: [
        { mid: 'l-0', h: 'England', a: 'Croatia', hs: 4, as: 2 },
        { mid: 'l-1', h: 'Ghana', a: 'Panama', hs: 1, as: 0 },

        { mid: 'l-3', h: 'Panama', a: 'Croatia', hs: 0, as: 1 },
        { mid: 'l-4', h: 'Panama', a: 'England', hs: 0, as: 2 },
        { mid: 'l-5', h: 'Croatia', a: 'Ghana', hs: 2, as: 1 },
      ],
    };

    function getScore(m, preds) {
      const p = preds[m.mid];
      return p ? { hs: p.h, as: p.a } : { hs: m.hs, as: m.as };
    }

    function computeStandings(groupId, preds) {
      const matches = groupMatches[groupId];
      const teams = {};
      matches.forEach((m) => {
        const { hs, as } = getScore(m, preds);
        [m.h, m.a].forEach((t) => {
          if (!teams[t]) teams[t] = { name: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
        });
        teams[m.h].p++; teams[m.a].p++;
        teams[m.h].gf += hs; teams[m.h].ga += as;
        teams[m.a].gf += as; teams[m.a].ga += hs;
        if (hs > as) { teams[m.h].w++; teams[m.h].pts += 3; teams[m.a].l++; }
        else if (hs < as) { teams[m.a].w++; teams[m.a].pts += 3; teams[m.h].l++; }
        else { teams[m.h].d++; teams[m.h].pts++; teams[m.a].d++; teams[m.a].pts++; }
      });
      return Object.values(teams).sort((a, b) =>
        b.pts - a.pts || b.gd - a.gd || b.gf - a.gf
      );
    }

    function fixtureHTML(m, preds) {
      const p = preds[m.mid];
      const hs = p ? p.h : m.hs;
      const as = p ? p.a : m.as;
      const fc = flags[m.h] || 'xx';
      const ac = flags[m.a] || 'xx';
      const isFT = m.hs !== '' && m.hs !== undefined && m.as !== '' && m.as !== undefined;
      const disabled = isFT ? ' disabled' : '';
      return `
        <div class="fixture-item" data-mid="${m.mid}">
          <div class="fixture-left">
            ${isFT ? '<span class="ft-tag">FT</span>' : ''}
            <span class="fixture-team"><img src="${flagUrl(fc)}" alt="" class="fixture-flag"> ${m.h}</span>
          </div>
          <div class="score-group">
            <div class="score-picker">
              <button class="scr-btn" data-action="dec" data-side="h"${disabled}>−</button>
              <span class="score" data-side="h">${hs}</span>
              <button class="scr-btn" data-action="inc" data-side="h"${disabled}>+</button>
            </div>
            <span class="vs">v</span>
            <div class="score-picker">
              <button class="scr-btn" data-action="dec" data-side="a"${disabled}>−</button>
              <span class="score" data-side="a">${as}</span>
              <button class="scr-btn" data-action="inc" data-side="a"${disabled}>+</button>
            </div>
          </div>
          <div class="fixture-right">
            <span class="fixture-team"><img src="${flagUrl(ac)}" alt="" class="fixture-flag"> ${m.a}</span>
          </div>
        </div>
      `;
    }

    function attachFixtureListeners() {
      document.querySelectorAll('.fixture-item[data-mid]').forEach((item) => {
        item.addEventListener('click', (e) => {
          const btn = e.target.closest('.scr-btn');
          if (!btn || btn.disabled) return;
          const side = btn.dataset.side;
          const scoreEl = item.querySelector(`.score[data-side="${side}"]`);
          let val = parseInt(scoreEl.textContent, 10);
          val = btn.dataset.action === 'inc' ? Math.min(val + 1, 99) : Math.max(val - 1, 0);
          scoreEl.textContent = val;
          const mid = item.dataset.mid;
          const preds = loadPreds();
          if (!preds[mid]) preds[mid] = { h: 0, a: 0 };
          preds[mid][side] = val;
          savePreds(preds);
          renderGroups();
        });
      });
    }

    function renderGroups() {
      const grid = document.getElementById('group-grid');
      grid.innerHTML = '';
      const preds = loadPreds();
      const groupIds = 'abcdefghijkl';
      const groupNames = {
        a:'Group A',b:'Group B',c:'Group C',d:'Group D',e:'Group E',f:'Group F',
        g:'Group G',h:'Group H',i:'Group I',j:'Group J',k:'Group K',l:'Group L'
      };

      for (const id of groupIds) {
        const rows = computeStandings(id, preds);
        const card = document.createElement('div');
        card.className = 'group-card';

        const matches = groupMatches[id];
        let fixturesHTML = '';
        let allComplete = true;
        matches.forEach((m) => {
          fixturesHTML += fixtureHTML(m, preds);
          const p = preds[m.mid];
          const hs = p ? p.h : m.hs;
          const as = p ? p.a : m.as;
          if (hs === '' || hs === undefined || as === '' || as === undefined) allComplete = false;
        });
        if (allComplete) completedGroups.add(id);

        const status = completedGroups.has(id) ? 'Complete' : 'In Progress';
        const badgeCls = completedGroups.has(id) ? 'badge' : 'badge warn';
        card.innerHTML = `
          <h3>${groupNames[id]} <span class="${badgeCls}">${status}</span></h3>
          <table>
            <thead><tr><th>#</th><th></th><th>Team</th><th>P</th><th>GD</th><th>Pts</th></tr></thead>
            <tbody>${rows.map((t, i) => {
              const gd = t.gd > 0 ? '+' + t.gd : String(t.gd);
              const code = flags[t.name] || 'xx';
              const cls = i < 2 ? ' class="qual"' : '';
              return `<tr${cls}><td class="pos">${i + 1}</td><td class="flag-cell"><img src="${flagUrl(code)}" alt="" loading="lazy"></td><td class="name-cell">${t.name}</td><td>${t.p}</td><td>${gd}</td><td class="pts-cell">${t.pts}</td></tr>`;
            }).join('')}</tbody>
          </table>
          <div class="fixtures-title">FIXTURES</div>
          <div class="fixture-list">${fixturesHTML}</div>
        `;
        grid.appendChild(card);
      }
      attachFixtureListeners();
    }

    const BRACKET_SEED_KEY = 'wc26_bracket_seeds';
    const roundMeta = [
      { id: 'r32', label: 'Round of 32' },
      { id: 'r16', label: 'Round of 16' },
      { id: 'qf', label: 'Quarter-finals' },

    const bracketData = {
      r32: [
        { h: 'Germany', hs: '1', a: 'Paraguay', as: '1', note: '4-3 pens' },    // 74 → R16[0].h
        { h: 'France', hs: '3', a: 'Sweden', as: '0' },                         // 77 → R16[0].a

    function loadSeeds() {
      try { return JSON.parse(localStorage.getItem(BRACKET_SEED_KEY)) || {}; }
      catch { return {}; }
    }

    function saveSeeds(s) {
      localStorage.setItem(BRACKET_SEED_KEY, JSON.stringify(s));
    }

    function getWinner(roundId, midx, seeds, noScore) {
      const m = bracketData[roundId][midx];
      const seed = seeds[roundId + '-' + midx];
      if (seed) return seed;
      if (!noScore) {
        const hs = parseInt(m.hs);
        const as = parseInt(m.as);
        if (!isNaN(hs) && !isNaN(as)) {
          if (hs > as) return m.h;
          if (as > hs) return m.a;
        }
      }
      const ri = roundMeta.findIndex(r => r.id === roundId);
      if (ri >= 0 && ri < roundMeta.length - 1) {
        const nextId = roundMeta[ri + 1].id;
        const nextM = bracketData[nextId][Math.floor(midx / 2)];
        if (nextM) {
          if (nextM.h === m.h) return m.h;
          if (nextM.h === m.a) return m.a;
          if (nextM.a === m.h) return m.h;
          if (nextM.a === m.a) return m.a;
        }
      }
      return null;
    }

    function clearDownstream(seeds, roundId, midx) {
      const ri = roundMeta.findIndex(r => r.id === roundId);
      if (ri < 0 || ri >= roundMeta.length - 1) return;
      const nextId = roundMeta[ri + 1].id;
      const nextMidx = Math.floor(midx / 2);
      delete seeds[nextId + '-' + nextMidx];
      clearDownstream(seeds, nextId, nextMidx);
    }

    function resolveBracket(seeds) {
      const r = JSON.parse(JSON.stringify(bracketData));
      for (let ri = 1; ri < roundMeta.length; ri++) {
        const prev = roundMeta[ri - 1].id;
        const curr = roundMeta[ri].id;
        r[curr].forEach((m, mi) => {
          const t = r[prev][mi * 2];
          const b = r[prev][mi * 2 + 1];
          if (t) m.h = getWinner(prev, mi * 2, seeds, true) || 'Winner TBD';
          if (b) m.a = getWinner(prev, mi * 2 + 1, seeds, true) || 'Winner TBD';
        });
      }
      return r;
    }

    function flagUrlBracket(code) {
      if (code === 'gb-sct') return 'https://flagcdn.com/24x18/gb-sct.png';
      if (code === 'gb-eng') return 'https://flagcdn.com/24x18/gb-eng.png';
      return `https://flagcdn.com/24x18/${code}.png`;
    }

    function bracketTeamHTML(name, side, pick, seeds, resolved, roundId, mi) {
      const known = name !== 'Winner TBD' && flags[name];
      const picked = pick === name;
      const cls = 'b-team' + (side === 'h' ? ' top' : ' bottom') + (picked ? ' picked' : '') + (known ? ' sel' : '');
      const fc = known ? flags[name] : null;
      return `<button type="button" class="${cls}" data-rid="${roundId}" data-midx="${mi}" data-side="${side}">` +
        (fc ? `<img src="${flagUrlBracket(fc)}" alt="" class="b-flag">` : '<span class="b-flag ph"></span>') +
        `<span class="b-name${known ? '' : ' unk'}">${name}</span>` +
        '</button>';
    }

    function renderBracket() {
      const seeds = loadSeeds();
      const resolved = resolveBracket(seeds);
      const bracket = document.getElementById('bracket');
      bracket.innerHTML = '';

      // Description card
      const desc = document.createElement('div');
      desc.className = 'b-desc';
      desc.innerHTML = '<h2 class="b-desc-h">Knockout Bracket</h2>' +
        '<p class="b-desc-p">Tap a team in any tie to send them through — winners flow automatically into the next round.</p>';
      bracket.appendChild(desc);

      // Bracket scroll
      const scroll = document.createElement('div');
      scroll.className = 'b-scroll';

      const inner = document.createElement('div');
      inner.className = 'b-inner';

      roundMeta.forEach((round, ri) => {
        const col = document.createElement('div');
        col.className = 'b-col';

        const label = document.createElement('div');
        label.className = 'b-label';
        label.textContent = round.label;
        col.appendChild(label);

        const matchList = document.createElement('div');
        matchList.className = 'b-matches';
        const matches = resolved[round.id];

        matches.forEach((m, mi) => {
          const seed = seeds[round.id + '-' + mi];
          const knownH = m.h !== 'Winner TBD' && flags[m.h];
          const knownA = m.a !== 'Winner TBD' && flags[m.a];

          const row = document.createElement('div');
          row.className = 'b-row';
          if (ri > 0) row.appendChild(document.createElement('span')).className = 'b-conn left';
          if (ri < roundMeta.length - 1) row.appendChild(document.createElement('span')).className = 'b-conn right';
          if (ri < roundMeta.length - 1 && mi % 2 === 0) row.appendChild(document.createElement('span')).className = 'b-conn vert';

          const card = document.createElement('div');
          card.className = 'b-card';

          card.innerHTML =
            bracketTeamHTML(m.h, 'h', seed, seeds, resolved, round.id, mi) +
            bracketTeamHTML(m.a, 'a', seed, seeds, resolved, round.id, mi);

          row.appendChild(card);
          matchList.appendChild(row);
        });

        col.appendChild(matchList);
        inner.appendChild(col);
      });

      // Champion column
      const champCol = document.createElement('div');
      champCol.className = 'b-col champ';
      const champLabel = document.createElement('div');
      champLabel.className = 'b-label';
      champLabel.textContent = 'Champion';
      champCol.appendChild(champLabel);
      const champWrap = document.createElement('div');
      champWrap.className = 'b-champ-wrap';
      const champRel = document.createElement('div');
      champRel.className = 'b-champ-rel';

      // Connector from final to champion
      const champConn = document.createElement('span');
      champConn.className = 'b-conn left';
      champRel.appendChild(champConn);

      const champInner = document.createElement('div');
      champInner.className = 'b-champ';

      // Trophy SVG
      champInner.innerHTML = '<svg class="b-trophy" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>';

      // Find champion from final
      const fnMatch = resolved.fn[0];
      const champSeed = seeds['fn-0'];
      const champ = champSeed === fnMatch.h ? fnMatch.h : champSeed === fnMatch.a ? fnMatch.a : null;
      const champKnown = champ && flags[champ];

      if (champ && champKnown) {
        champInner.innerHTML +=
          `<img src="${flagUrlBracket(flags[champ])}" alt="" class="b-champ-flag">` +
          `<span class="b-champ-name">${champ}</span>`;
      } else {
        champInner.innerHTML += '<span class="b-champ-name unk">Pick the final to crown a winner</span>';
      }
      champRel.appendChild(champInner);
      champWrap.appendChild(champRel);
      champCol.appendChild(champWrap);
      inner.appendChild(champCol);

      scroll.appendChild(inner);
      bracket.appendChild(scroll);

      // Event listeners for team buttons
      bracket.querySelectorAll('.b-team.sel').forEach(btn => {
        btn.addEventListener('click', () => {
          const rid = btn.dataset.rid;
          const mi = parseInt(btn.dataset.midx);
          const side = btn.dataset.side;
          const match = resolved[rid][mi];
          const team = side === 'h' ? match.h : match.a;
          const s = loadSeeds();
          const key = rid + '-' + mi;
          if (s[key] === team) delete s[key];
          else s[key] = team;
          clearDownstream(s, rid, mi);
          saveSeeds(s);
          renderBracket();
        });
      });
    }

    document.getElementById('reset-btn').addEventListener('click', () => {
      localStorage.removeItem(BRACKET_SEED_KEY);
      renderGroups();
      renderBracket();
    });

    renderGroups();
    renderBracket();

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));
        tab.classList.add('active');
        const view = document.getElementById(tab.dataset.tab + '-view');
        view.classList.add('active');
        if (tab.dataset.tab === 'knockouts') {
          view.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  </script>
</body>
</html>
